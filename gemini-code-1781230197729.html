<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Mulher de Valor | Patrícia Pasquali</title>
    <style>
        /* CSS Reset e Variáveis de Design */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #fbf9f6;
            --text-dark: #2c2520;
            --text-muted: #5a5048;
            --accent-gold: #b89253;
            --accent-gold-hover: #9c783d;
            --accent-green: #4a5d4e;
            --white: #ffffff;
            --card-bg: #f5f0e9;
            --border-light: #e6dfd5;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .badge-diagnostico {
            display: inline-block;
            background-color: var(--accent-green);
            color: var(--white);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .btn-cta {
            display: inline-block;
            background-color: var(--accent-gold);
            color: var(--white);
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 18px 40px;
            border-radius: 8px;
            border-bottom: 4px solid var(--accent-gold-hover);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(184, 146, 83, 0.2);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .btn-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(184, 146, 83, 0.3);
            background-color: var(--accent-gold-hover);
        }

        .btn-container {
            text-align: center;
            margin: 40px 0;
        }

        header.hero {
            padding: 60px 0 40px 0;
            text-align: center;
            background: linear-gradient(180deg, #f3ede4 0%, var(--bg-color) 100%);
        }

        header.hero h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-dark);
            line-height: 1.2;
            margin-bottom: 15px;
            max-width: 850px;
            margin-left: auto;
            margin-right: auto;
        }

        header.hero p.subtitle {
            font-size: 18px;
            color: var(--accent-gold);
            font-weight: 600;
            max-width: 700px;
            margin: 0 auto 30px auto;
        }

        .vsl-section {
            margin-bottom: 60px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background-color: #000;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border-light);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        }

        .section-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
            position: relative;
        }

        .section-title::after {

            height: 3px;
            background-color: var(--accent-gold);
            margin: 12px auto 0 auto;
        }

        .testimonials-images-container {
            display: flex;
            flex-direction: column;

            gap: 20px;
            max-width: 600px;
            margin: 0 auto;

        .testimonial-img {

        .target-section {

            border-radius: 12px;
            border: 1px solid var(--border-light);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);

            margin-bottom: 30px;
        }

        .target-box.is-for { border-top: 5px solid var(--accent-green); }

        .target-box h3 {

        .target-box.is-for h3 { color: var(--accent-green); }
        .target-box.is-not h3 { color: #a65353; }

        .target-list { list-style: none; }

            font-size: 16px;

        }

        .questions-list { list-style: none; margin-bottom: 30px; }

            color: var(--accent-gold);

        .discovery-box {

            padding-top: 20px;
        }

        .discovery-box span {
            font-size: 12px;
            font-weight: 700;

            display: block;

        }

        .discovery-box blockquote {

            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .step-block.devolutiva {
            background-color: #f3ede4;
            border: 1px solid var(--accent-gold);
        }

        .step-block.devolutiva blockquote {

        .frase-central-container {

            border-radius: 12px;
            text-align: center;

        .frase-central-container span {
            color: var(--accent-gold);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 15px;
        }

        .frase-central-container p {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            max-width: 800px;
            margin: 0 auto;
        }

        .method-section {
            padding: 60px 0;
            background-color: var(--white);
            border-top: 1px solid var(--border-light);
        }

        .transition-text {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-gold);
            margin-bottom: 40px;
        }

        .method-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 5px;
        }

        .method-card {
            background-color: var(--bg-color);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
            text-align: center;
        }

        .method-card h4 {
            font-size: 18px;
            color: var(--accent-green);
            margin-bottom: 8px;
            text-transform: uppercase;

        .method-card p { font-size: 15px; color: var(--text-muted); }

        .pilar-comunicacao { text-align: center; margin: 50px 0 20px 0; padding: 0 20px; }

        .bio-section {
            padding: 60px 0;
            background-color: #f5f0e9;
            border-top: 1px solid var(--border-light);
        }

        .bio-wrapper {

            align-items: center;
            gap: 30px;
        }

        .bio-image-container { width: 100%; max-width: 380px; }

        .bio-image {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            display: block;
        }

        .bio-content h2 { font-size: 26px; margin-bottom: 20px; color: var(--text-dark); }

            font-weight: 600;
            color: var(--text-dark);
        }
